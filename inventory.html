<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMERCH | ASSETS REGISTRY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14; --card: #151921; --text: #f0f6fc; --accent: #58a6ff;
            --border: #30363d; --primary-red: #d90429; --secondary: #8b949e; --green: #238636;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px; }
        
        /* Header & Stats */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--primary-red); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .stat-val { display: block; font-size: 2rem; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary); }

        /* Controls */
        .search-bar { width: 100%; padding: 15px 25px; background: var(--card); border: 1px solid var(--border); border-radius: 15px; color: white; font-family: inherit; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .search-bar:focus { border-color: var(--accent); }
        .btn-add { background: var(--primary-red); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(217, 4, 41, 0.4); }

        /* Table */
        .table-container { background: var(--card); border-radius: 25px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        th { padding: 20px; background: rgba(255,255,255,0.02); font-size: 0.7rem; text-transform: uppercase; color: var(--secondary); border-bottom: 1px solid var(--border); }
        td { padding: 20px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .price-tag { color: var(--green); font-weight: 800; }
        .asset-id { font-family: monospace; background: #30363d; padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; }

        /* Modal Form */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 30px; width: 100%; max-width: 500px; position: relative; }
        .modal-header { margin-bottom: 25px; font-weight: 800; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--secondary); margin-bottom: 8px; font-weight: 800; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box; }
        .btn-save { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">IMERCH <span>ASSETS REGISTRY</span></div>
        <button class="btn-add" onclick="toggleModal(true)"><i class="fas fa-plus"></i> ADD ASSET</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Total Units</span>
            <span class="stat-val" id="total-assets">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Inventory Value</span>
            <span class="stat-val" id="total-value">₱0</span>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-bar" placeholder="Search by Employee, Serial, or Asset Tag..." onkeyup="filterTable()">

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Asset Tag</th>
                    <th>Category & Specs</th>
                    <th>Assigned To</th>
                    <th>Price</th>
                    <th>Purchased</th>
                    <th>Received</th>
                </tr>
            </thead>
            <tbody id="assetTableBody"></tbody>
        </table>
    </div>

    <div class="modal" id="assetModal">
        <div class="modal-content">
            <div class="modal-header">Register New Asset</div>
            <form id="assetForm">
                <div class="form-group">
                    <label>Asset Tag (ID)</label>
                    <input type="text" id="tag" placeholder="e.g. IM-LP-001" required>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="Laptop">Laptop</option>
                            <option value="Desktop">Desktop PC</option>
                            <option value="Printer">Printer</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Purchase Price</label>
                        <input type="number" id="price" placeholder="45000" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Brand & Specs</label>
                    <input type="text" id="specs" placeholder="e.g. Macbook Air M2 16GB" required>
                </div>
                <div class="form-group">
                    <label>Assigned Employee</label>
                    <input type="text" id="employee" placeholder="Full Name" required>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div class="form-group">
                        <label>Date Purchased</label>
                        <input type="date" id="dateP" required>
                    </div>
                    <div class="form-group">
                        <label>Date Received</label>
                        <input type="date" id="dateR" required>
                    </div>
                </div>
                <button type="submit" class="btn-save">SAVE TO REGISTRY</button>
                <button type="button" onclick="toggleModal(false)" style="background:transparent; border:none; color:var(--secondary); width:100%; margin-top:10px; cursor:pointer; font-weight:800; font-size:0.7rem;">CANCEL</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG (Palitan mo ito ng galing sa Firebase mo)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "imerch-assets-registry.firebaseapp.com",
            projectId: "imerch-assets-registry",
            appId: "1:..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Toggle Modal
        window.toggleModal = (show) => {
            document.getElementById('assetModal').style.display = show ? 'flex' : 'none';
        };

        // Save Data
        document.getElementById('assetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "assets"), {
                    assetTag: document.getElementById('tag').value,
                    itemName: document.getElementById('category').value,
                    specs: document.getElementById('specs').value,
                    employee: document.getElementById('employee').value,
                    price: Number(document.getElementById('price').value),
                    datePurchased: document.getElementById('dateP').value,
                    dateReceived: document.getElementById('dateR').value
                });
                document.getElementById('assetForm').reset();
                toggleModal(false);
                alert("Asset Registered Successfully!");
            } catch (err) { console.error(err); }
        });

        // Load Real-time Data
        onSnapshot(query(collection(db, "assets"), orderBy("assetTag", "asc")), (snapshot) => {
            const tableBody = document.getElementById('assetTableBody');
            let rows = "", totalVal = 0, count = 0;

            snapshot.forEach((doc) => {
                const d = doc.data();
                count++;
                totalVal += (d.price || 0);
                rows += `
                    <tr>
                        <td><span class="asset-id">${d.assetTag}</span></td>
                        <td><div style="font-weight:800;">${d.itemName}</div><div style="font-size:0.7rem; color:var(--secondary)">${d.specs}</div></td>
                        <td><i class="fas fa-user-circle" style="color:var(--accent); margin-right:8px;"></i>${d.employee}</td>
                        <td class="price-tag">₱${Number(d.price).toLocaleString()}</td>
                        <td>${d.datePurchased}</td>
                        <td>${d.dateReceived}</td>
                    </tr>
                `;
            });

            tableBody.innerHTML = rows;
            document.getElementById('total-assets').innerText = count;
            document.getElementById('total-value').innerText = "₱" + totalVal.toLocaleString();
        });

        // Filter Table
        window.filterTable = () => {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.getElementById("assetTableBody").getElementsByTagName("tr");
            for (let row of rows) row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        };
    </script>
</body>
</html>
