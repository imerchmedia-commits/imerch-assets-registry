<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMERCH | ASSET REGISTRY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: #58a6ff; --border: #30363d; --red: #d90429; --text: #f0f6fc; --secondary: #8b949e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); height: 100vh; border-right: 1px solid var(--border); padding: 40px 20px; position: fixed; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text); margin-bottom: 50px; }
        .logo span { color: var(--red); }
        .nav-item { padding: 15px 20px; border-radius: 12px; color: var(--secondary); text-decoration: none; display: flex; align-items: center; gap: 15px; margin-bottom: 8px; transition: 0.3s; font-weight: 600; }
        .nav-item.active { background: rgba(88, 166, 255, 0.1); color: var(--accent); }
        .nav-item:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        /* Main Content */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .btn { border: none; padding: 12px 24px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; font-family: inherit; }
        .btn-add { background: var(--red); color: white; }
        .btn-export { background: #21262d; color: var(--text); border: 1px solid var(--border); }

        /* Table */
        .table-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 20px; background: rgba(255,255,255,0.02); text-align: left; font-size: 0.7rem; color: var(--secondary); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 25px; width: 450px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.7rem; color: var(--secondary); margin-bottom: 5px; font-weight: 800; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0b0e14; border: 1px solid var(--border); border-radius: 8px; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">iMerch<span>.</span>Assets</div>
        <a href="index.html" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="registry.html" class="nav-item active"><i class="fas fa-list"></i> Asset Registry</a>
    </div>

    <div class="main">
        <div class="header">
            <h1>Asset Registry</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-export" onclick="exportToExcel()"><i class="fas fa-download"></i> Export</button>
                <button class="btn btn-add" onclick="openModal()"><i class="fas fa-plus"></i> Add Asset</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Asset Tag</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Price</th>
                        <th>Purchase Date</th>
                        <th>Warranty</th>
                    </tr>
                </thead>
                <tbody id="assetList"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">New Asset</h2>
            <form id="assetForm">
                <div class="form-group"><label>Tag</label><input type="text" id="tag" placeholder="IM-2026-001" required></div>
                <div class="form-group"><label>Category</label>
                    <select id="category">
                        <option>Laptop</option><option>Desktop</option><option>Printer</option><option>Mobile</option>
                    </select>
                </div>
                <div class="form-group"><label>Description</label><input type="text" id="specs" placeholder="MacBook Pro M3 / 16GB" required></div>
                <div class="form-group"><label>Price (PHP)</label><input type="number" id="price" required></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <div class="form-group"><label>Purchase Date</label><input type="date" id="dateP" required></div>
                    <div class="form-group"><label>Warranty</label><input type="date" id="warranty" required></div>
                </div>
                <button type="submit" class="btn btn-add" style="width:100%; justify-content:center">Save to Firebase</button>
                <button type="button" onclick="closeModal()" style="background:none; border:none; color:var(--secondary); width:100%; margin-top:10px; cursor:pointer">Cancel</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCF_13Be6pBym7R5d3dEGWr_LMrETSK5jY",
            authDomain: "imerch-assets-registry.firebaseapp.com",
            projectId: "imerch-assets-registry",
            storageBucket: "imerch-assets-registry.firebasestorage.app",
            messagingSenderId: "548511905607",
            appId: "1:548511905607:web:972255df769c3a389c3e62"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allData = [];

        // UI Logic
        window.openModal = () => document.getElementById('modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        // Add Data
        document.getElementById('assetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "assets"), {
                tag: document.getElementById('tag').value,
                category: document.getElementById('category').value,
                specs: document.getElementById('specs').value,
                price: Number(document.getElementById('price').value),
                dateP: document.getElementById('dateP').value,
                warranty: document.getElementById('warranty').value
            });
            closeModal();
            document.getElementById('assetForm').reset();
        });

        // Listen for Data
        onSnapshot(query(collection(db, "assets"), orderBy("dateP", "desc")), (snap) => {
            let rows = "";
            allData = [];
            snap.forEach(doc => {
                const d = doc.data();
                allData.push(d);
                rows += `<tr>
                    <td style="color:var(--accent); font-weight:800">${d.tag}</td>
                    <td>${d.category}</td>
                    <td>${d.specs}</td>
                    <td style="color:var(--accent)">₱${Number(d.price).toLocaleString()}</td>
                    <td>${d.dateP}</td>
                    <td>${d.warranty}</td>
                </tr>`;
            });
            document.getElementById('assetList').innerHTML = rows;
        });

        window.exportToExcel = () => {
            const ws = XLSX.utils.json_to_sheet(allData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "iMerch Assets");
            XLSX.writeFile(wb, "iMerch_Assets_Report.xlsx");
        };
    </script>
</body>
</html>
