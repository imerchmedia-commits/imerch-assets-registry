<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMERCH | DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: #58a6ff; --border: #30363d; --red: #d90429; --text: #f0f6fc; --green: #238636; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); height: 100vh; border-right: 1px solid var(--border); padding: 40px 20px; position: fixed; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text); margin-bottom: 50px; padding-left: 10px; }
        .logo span { color: var(--red); }
        .nav-item { padding: 15px 20px; border-radius: 12px; color: #8b949e; text-decoration: none; display: flex; align-items: center; gap: 15px; margin-bottom: 8px; transition: 0.3s; font-weight: 600; }
        .nav-item.active { background: rgba(88, 166, 255, 0.1); color: var(--accent); }
        .nav-item:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        /* Main Content */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .kpi-card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); }
        .kpi-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        .kpi-val { font-size: 1.8rem; font-weight: 800; display: block; margin-top: 8px; color: var(--accent); }

        .charts-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; }
        .chart-box { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        h3 { margin-top: 0; font-size: 1.1rem; margin-bottom: 25px; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">iMerch<span>.</span>Assets</div>
        <a href="dashboard.html" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="registry.html" class="nav-item"><i class="fas fa-box"></i> Asset Registry</a>
    </div>

    <div class="main">
        <div class="kpi-grid">
            <div class="kpi-card"><span class="kpi-label">Total Investment</span><span class="kpi-val" id="v-total">₱0</span></div>
            <div class="kpi-card"><span class="kpi-label">Total Units</span><span class="kpi-val" id="v-units">0</span></div>
            <div class="kpi-card"><span class="kpi-label">Active Warranty</span><span class="kpi-val" style="color:var(--green)" id="v-active">0</span></div>
            <div class="kpi-card"><span class="kpi-label">Expired</span><span class="kpi-val" style="color:var(--red)" id="v-expired">0</span></div>
        </div>

        <div class="charts-grid">
            <div class="chart-box">
                <h3>Monthly Spending Analysis (PHP)</h3>
                <canvas id="barChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Equipment Distribution</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let barChart, pieChart;

        onSnapshot(collection(db, "assets"), (snap) => {
            let total = 0, units = 0, active = 0, expired = 0;
            let catMap = {}, monthMap = {};
            const today = new Date();

            snap.forEach(doc => {
                const d = doc.data();
                units++;
                total += d.price;
                if(new Date(d.warranty) < today) expired++; else active++;
                
                catMap[d.category] = (catMap[d.category] || 0) + 1;
                const m = d.dateP.substring(0, 7); // Get YYYY-MM
                monthMap[m] = (monthMap[m] || 0) + d.price;
            });

            document.getElementById('v-total').innerText = "₱" + total.toLocaleString();
            document.getElementById('v-units').innerText = units;
            document.getElementById('v-active').innerText = active;
            document.getElementById('v-expired').innerText = expired;

            renderCharts(catMap, monthMap);
        });

        function renderCharts(cats, months) {
            if(barChart) barChart.destroy();
            if(pieChart) pieChart.destroy();

            barChart = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(months).sort(),
                    datasets: [{ label: 'Cost', data: Object.values(months), backgroundColor: '#58a6ff', borderRadius: 8 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#30363d' } } } }
            });

            pieChart = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{ data: Object.values(cats), backgroundColor: ['#d90429', '#58a6ff', '#238636', '#f1e05a'], borderWidth: 0 }]
                },
                options: { cutout: '70%' }
            });
        }
    </script>
</body>
</html>
